name: Release

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ============================================
  # Check if this is a release commit
  # ============================================
  check-release-commit:
    name: Check Release Commit
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      is_stable: ${{ steps.check.outputs.is_stable }}
    steps:
      - name: Check commit message
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" =~ ^chore\(release\): ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            if [[ "$COMMIT_MSG" =~ stable ]]; then
              echo "is_stable=true" >> $GITHUB_OUTPUT
              echo "Stable release detected: will bump major version"
            else
              echo "is_stable=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "Skipping: commit does not match 'chore(release): ...'"
          fi

  # ============================================
  # Wait for CI to pass
  # ============================================
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    needs: [check-release-commit]
    if: needs.check-release-commit.outputs.is_release == 'true'

    permissions:
      checks: read

    steps:
      - name: Wait for Lint
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Lint'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for Type Check
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Type Check'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for Unit Tests
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Unit Tests'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  # ============================================
  # Release with Commitizen
  # ============================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [check-release-commit, wait-for-ci]
    if: needs.check-release-commit.outputs.is_release == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install commitizen
        run: pip install commitizen

      - name: Configure git
        run: |
          git config --local user.email "goabonga@pm.me"
          git config --local user.name "goabonga"

      - name: Check for releasable commits
        id: check
        run: |
          if cz bump --dry-run 2>&1 | grep -q "No commits found"; then
            echo "has_commits=false" >> $GITHUB_OUTPUT
          else
            echo "has_commits=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Bump version and create changelog
        if: steps.check.outputs.has_commits == 'true'
        id: bump
        run: |
          IS_STABLE="${{ needs.check-release-commit.outputs.is_stable }}"
          if [ "$IS_STABLE" = "true" ]; then
            echo "Stable release: bumping major version"
            cz bump --increment MAJOR --yes
          else
            cz bump --yes
          fi
          echo "version=$(cz version --project)" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Push changes
        if: steps.bump.outputs.version != ''
        run: |
          git push
          git push --tags

      - name: Build package
        if: steps.bump.outputs.version != ''
        run: |
          pip install --upgrade build
          python -m build --sdist --wheel --outdir dist/

      - name: Publish to PyPI
        if: steps.bump.outputs.version != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        if: steps.bump.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          body_path: CHANGELOG.md
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
